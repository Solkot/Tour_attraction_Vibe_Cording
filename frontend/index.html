<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 관광 챗봇</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        #chat-container { max-width: 500px; margin: 20px auto; background: white; height: 80vh; display: flex; flex-direction: column; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 20px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #0084ff; color: white; }
        .bot { align-self: flex-start; background-color: #e9ecef; color: black; }
        #input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background-color: #0084ff; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-history">
        <div class="message bot">안녕하세요! 주변 관광지가 궁금하신가요? 질문을 입력해주세요.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="예: 여기 근처에 갈만한 맛집이나 명소 추천해줘">
        <button onclick="handleSend()">전송</button>
    </div>
</div>

<script>
    let userLat = null;
    let userLon = null;

    // 1. 위치 정보 먼저 가져오기 (시작 시)
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
            });
        }
    };

    async function handleSend() {
        const inputField = document.getElementById('user-input');
        const query = inputField.value.trim();
        if (!query) return;

        // 화면에 사용자 질문 추가
        addMessage(query, 'user');
        inputField.value = '';

        // 로딩 메시지 표시
        const loadingId = addMessage("생각 중...", 'bot');

        try {
            const response = await fetch('http://127.0.0.1:8000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_query: query, 
                    lat: userLat || 37.5665, // 위치 정보 없으면 기본값(서울)
                    lon: userLon || 126.9780 
                })
            });

            const data = await response.json();
            
            // 로딩 메시지 제거 후 AI 응답 추가
            document.getElementById(loadingId).remove();
            addMessage(data.reply, 'bot');
        } catch (error) {
            document.getElementById(loadingId).remove();
            addMessage("죄송합니다. 서버와 연결할 수 없습니다.", 'bot');
        }
    }

    function addMessage(text, sender) {
        const history = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        const msgId = 'msg-' + Date.now();
        msgDiv.id = msgId;
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        history.appendChild(msgDiv);
        history.scrollTop = history.scrollHeight;
        return msgId;
    }

    // 엔터키 입력 지원
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
